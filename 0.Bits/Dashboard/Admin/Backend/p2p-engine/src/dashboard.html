<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P Agent Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['ui-monospace', 'SFMono-Regular', 'monospace'] }
        }
      }
    }
  </script>
</head>

<body class="bg-neutral-950 text-neutral-200 font-mono text-sm p-4 min-h-screen">

  <h1 class="text-base text-green-400 mb-3">P2P Agent Dashboard</h1>

  <div id="orders" class="flex flex-col gap-1.5 mt-3">Loading...</div>

  <!-- Blocklists -->
  <details class="mt-4 bg-neutral-900 border border-neutral-800 rounded-sm p-3">
    <summary class="text-xs text-neutral-400 cursor-pointer hover:text-neutral-200">Compliance Blocklists</summary>
    <div id="blocklists" class="mt-2 text-xs">Loading...</div>
  </details>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 z-50 items-center justify-center">
    <div class="bg-neutral-900 border border-neutral-700 p-4 min-w-[320px] max-w-[440px] rounded">
      <div id="modal-title" class="text-sm text-green-400 mb-2.5"></div>
      <div id="modal-body" class="text-xs text-neutral-400 mb-3 leading-relaxed"></div>
      <div id="modal-actions" class="flex gap-1.5 justify-end"></div>
      <div id="modal-result" class="text-xs pt-2 leading-relaxed"></div>
    </div>
  </div>

  <script>
    // ── State badge colors ──
    const stateColors = {
      marked_as_paid: 'bg-yellow-900/60 text-yellow-400',
      appealed: 'bg-red-900/60 text-red-400',
      releasing: 'bg-green-900/60 text-green-400',
      delayed: 'bg-yellow-800/60 text-yellow-300',
      third_party_confirmed: 'bg-fuchsia-900/60 text-fuchsia-400',
      error: 'bg-red-950 text-red-400',
      agent_required: 'bg-orange-900/60 text-orange-400',
      agent_processing: 'bg-lime-900/60 text-lime-400',
      refunded: 'bg-blue-900/60 text-blue-400',
    };

    // ── Modal System ──
    const modal = {
      el: () => document.getElementById('modal'),
      title: () => document.getElementById('modal-title'),
      body: () => document.getElementById('modal-body'),
      actions: () => document.getElementById('modal-actions'),
      result: () => document.getElementById('modal-result'),

      open(title, bodyHtml, buttons) {
        this.title().textContent = title;
        this.body().innerHTML = bodyHtml;
        this.result().textContent = '';
        this.result().className = 'text-xs pt-2 leading-relaxed';
        this.actions().innerHTML = buttons.map(b =>
          `<button class="${b.cls}" onclick="${b.onclick}">${b.label}</button>`
        ).join('');
        const el = this.el();
        el.classList.remove('hidden');
        el.classList.add('flex');
      },

      close() {
        const el = this.el();
        el.classList.add('hidden');
        el.classList.remove('flex');
      },

      showResult(msg, ok) {
        const r = this.result();
        r.textContent = msg;
        r.className = `text-xs pt-2 leading-relaxed ${ok ? 'text-green-400' : 'text-red-400'}`;
        this.actions().innerHTML = `<button class="bg-neutral-800 text-neutral-300 border border-neutral-600 px-3 py-1 text-xs font-mono cursor-pointer hover:bg-neutral-700 rounded-sm" onclick="modal.close()">Close</button>`;
      },

      confirm(title, message, onConfirm) {
        const btnBase = 'px-3 py-1 text-xs font-mono cursor-pointer rounded-sm';
        this.open(title, `<p>${message}</p>`, [
          { label: 'Cancel', cls: `${btnBase} bg-neutral-800 text-neutral-300 border border-neutral-600 hover:bg-neutral-700`, onclick: 'modal.close()' },
          { label: 'Confirm', cls: `${btnBase} bg-neutral-800 text-green-400 border border-green-700 hover:bg-green-950`, onclick: onConfirm },
        ]);
      },

      prompt(title, message, placeholder, onSubmitFn) {
        window._modalSubmit = onSubmitFn;
        const btnBase = 'px-3 py-1 text-xs font-mono cursor-pointer rounded-sm';
        this.open(title, `<p>${message}</p><input class="w-full bg-neutral-800 border border-neutral-600 text-neutral-200 px-2 py-1.5 font-mono text-xs mt-2 rounded-sm focus:outline-none focus:border-green-500" id="modal-input" placeholder="${placeholder}">`, [
          { label: 'Cancel', cls: `${btnBase} bg-neutral-800 text-neutral-300 border border-neutral-600 hover:bg-neutral-700`, onclick: 'modal.close()' },
          { label: 'Submit', cls: `${btnBase} bg-neutral-800 text-green-400 border border-green-700 hover:bg-green-950`, onclick: '_modalSubmit(document.getElementById("modal-input").value)' },
        ]);
        setTimeout(() => {
          const inp = document.getElementById('modal-input');
          if (inp) { inp.focus(); inp.addEventListener('keydown', e => { if (e.key === 'Enter') _modalSubmit(inp.value); }); }
        }, 50);
      }
    };

    document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) modal.close(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.close(); });

    // ── Data ──
    async function refresh() {
      const r = await fetch('/api/orders');
      const d = await r.json();
      const el = document.getElementById('orders');

      if (!d.data || d.data.length === 0) { el.innerHTML = '<span class="text-neutral-500">No open orders</span>'; return; }

      el.innerHTML = d.data.map(o => {
        const ext = o.external_id;
        const ion = o.internal_order_number || ext.slice(-8);
        const st = o.internal_state;
        const side = o.side || 'sell';
        const isBuy = side === 'buy';
        const badge = stateColors[st] || 'bg-neutral-700 text-neutral-300';
        const sideBadge = isBuy
          ? 'bg-blue-900/60 text-blue-400'
          : 'bg-green-900/60 text-green-400';

        // Side-specific action buttons
        const sideActions = isBuy
          ? `<button class="px-2.5 py-1 text-xs font-mono bg-neutral-800 border border-blue-600 text-neutral-300 hover:bg-blue-950 cursor-pointer rounded-sm" onclick="openPayoutModal('${ext}','${ion}','${o.fiat_amount || ''}','${o.fiat_currency || 'EUR'}')">Payout</button>`
          : `<button class="px-2.5 py-1 text-xs font-mono bg-neutral-800 border border-green-600 text-neutral-300 hover:bg-green-950 cursor-pointer rounded-sm" onclick="releaseOrder('${ext}','${ion}')">Release</button>`;

        return `<div class="bg-neutral-900 border border-neutral-800 px-3 py-2.5 flex items-center gap-3 rounded-sm">
      <span class="px-2 py-0.5 rounded text-[11px] min-w-[40px] text-center ${sideBadge}">${side.toUpperCase()}</span>
      <span class="px-2 py-0.5 rounded text-[11px] min-w-[100px] text-center ${badge}">${st}</span>
      <strong class="text-neutral-200">${ion}</strong>
      <div class="flex gap-1 ml-auto">
        ${sideActions}
        <button class="px-2.5 py-1 text-xs font-mono bg-neutral-800 border border-cyan-600 text-neutral-300 hover:bg-cyan-950 cursor-pointer rounded-sm" onclick="openChat('${ext}','${ion}')">Chat</button>
        <button class="px-2.5 py-1 text-xs font-mono bg-neutral-800 border border-yellow-600 text-neutral-300 hover:bg-yellow-950 cursor-pointer rounded-sm" onclick="override('${ext}')">Manual Override</button>
        <button class="px-2.5 py-1 text-xs font-mono bg-neutral-800 border border-fuchsia-600 text-neutral-300 hover:bg-fuchsia-950 cursor-pointer rounded-sm" onclick="thirdParty('${ext}')">Third Party</button>
        <button class="px-2.5 py-1 text-xs font-mono bg-neutral-800 border border-red-600 text-neutral-300 hover:bg-red-950 cursor-pointer rounded-sm" onclick="refund('${ext}')">Refund</button>
      </div>
    </div>`;
      }).join('');
    }

    // ── Actions ──
    function override(ext) {
      modal.confirm('Manual Override', 'Move order to agent_processing?', `doOverride('${ext}')`);
    }
    async function doOverride(ext) {
      await fetch(`/api/order/${ext}/transition?to_state=agent_processing&reason=manual_override`, { method: 'POST' });
      modal.showResult('Order moved to agent_processing', true);
      refresh();
    }

    function thirdParty(ext) {
      modal.prompt('Mark Third Party', 'Enter the Januar transaction ID:', 'e972f892-8fc7-37f3-a624-...', async (val) => {
        if (!val || !val.trim()) return;
        const r = await fetch(`/api/order/${ext}/third-party?transaction_id=${encodeURIComponent(val.trim())}`, { method: 'POST' });
        const d = await r.json();
        d.success
          ? modal.showResult(`Assigned: €${d.data.payment.amount} from ${d.data.payment.sender}`, true)
          : modal.showResult(d.error, false);
        refresh();
      });
    }

    function refund(ext) {
      modal.confirm('Refund Order', 'This will send money back via Januar. Continue?', `doRefund('${ext}')`);
    }
    async function doRefund(ext) {
      const r = await fetch(`/api/order/${ext}/refund?reason=agent_refund`, { method: 'POST' });
      const d = await r.json();
      d.success
        ? modal.showResult(`Refunded: €${d.data.amount} to ${d.data.recipient} (${d.data.iban})`, true)
        : modal.showResult(d.error, false);
      refresh();
    }

    // ── Release (Sell Orders) ──
    function releaseOrder(ext, ion) {
      modal.confirm('Release Crypto', `Release crypto for order ${ion}? This cannot be undone.`, `doRelease('${ext}')`);
    }
    async function doRelease(ext) {
      const r = await fetch(`/api/orders/${ext}/release`, { method: 'POST' });
      const d = await r.json();
      d.success && d.data.released
        ? modal.showResult('Crypto released successfully', true)
        : modal.showResult(d.data?.error || d.error || 'Release failed', false);
      refresh();
    }

    // ── Payout Modal (Buy Orders) ──
    function openPayoutModal(ext, ion, amount, currency) {
      const btnBase = 'px-3 py-1 text-xs font-mono cursor-pointer rounded-sm';
      modal.open(`Send Payout — ${ion}`, `
        <p class="mb-2">Send <strong>${amount} ${currency}</strong> to seller</p>
        <label class="block text-[11px] text-neutral-500 mb-0.5">Recipient Name</label>
        <input id="payout-name" class="w-full bg-neutral-800 border border-neutral-600 text-neutral-200 px-2 py-1.5 font-mono text-xs mb-2 rounded-sm focus:outline-none focus:border-blue-500" placeholder="JOHN DOE">
        <label class="block text-[11px] text-neutral-500 mb-0.5">IBAN</label>
        <input id="payout-iban" class="w-full bg-neutral-800 border border-neutral-600 text-neutral-200 px-2 py-1.5 font-mono text-xs rounded-sm focus:outline-none focus:border-blue-500" placeholder="DE89370400440532013000">
      `, [
        { label: 'Cancel', cls: `${btnBase} bg-neutral-800 text-neutral-300 border border-neutral-600 hover:bg-neutral-700`, onclick: 'modal.close()' },
        { label: 'Send Payout', cls: `${btnBase} bg-neutral-800 text-blue-400 border border-blue-700 hover:bg-blue-950`, onclick: `doSendPayout('${ext}')` },
      ]);
      setTimeout(() => document.getElementById('payout-name')?.focus(), 50);
    }
    async function doSendPayout(ext) {
      const name = document.getElementById('payout-name')?.value.trim();
      const iban = document.getElementById('payout-iban')?.value.trim();
      if (!name || !iban) { modal.showResult('Name and IBAN are required', false); return; }
      const params = `recipient_name=${encodeURIComponent(name)}&recipient_iban=${encodeURIComponent(iban)}`;
      const r = await fetch(`/api/orders/${ext}/execute-payout?${params}`, { method: 'POST' });
      const d = await r.json();
      d.success
        ? modal.showResult(`Payout sent + order marked paid`, true)
        : modal.showResult(d.data?.error || d.error || 'Payout failed', false);
      refresh();
    }

    refresh();
    setInterval(refresh, 10000);

    // ── Chat ──
    let _chatOrderId = null;
    let _chatInterval = null;

    async function openChat(ext, label) {
      _chatOrderId = ext;
      const btnBase = 'px-3 py-1 text-xs font-mono cursor-pointer rounded-sm';
      modal.open(`Chat — ${label}`, '<div id="chat-msgs" class="max-h-[300px] overflow-y-auto mb-2 space-y-1">Loading...</div><div class="flex gap-1"><input id="chat-input" class="flex-1 bg-neutral-800 border border-neutral-600 text-neutral-200 px-2 py-1.5 font-mono text-xs rounded-sm focus:outline-none focus:border-cyan-500" placeholder="Type a message..."><button class="' + btnBase + ' bg-neutral-800 text-cyan-400 border border-cyan-700 hover:bg-cyan-950" onclick="sendChat()">Send</button></div>', [
        { label: 'Close', cls: `${btnBase} bg-neutral-800 text-neutral-300 border border-neutral-600 hover:bg-neutral-700`, onclick: 'closeChat()' },
      ]);
      setTimeout(() => {
        const inp = document.getElementById('chat-input');
        if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
      }, 50);
      await loadMessages();
      _chatInterval = setInterval(loadMessages, 5000);
    }

    function closeChat() { clearInterval(_chatInterval); _chatOrderId = null; modal.close(); }

    async function loadMessages() {
      if (!_chatOrderId) return;
      const r = await fetch(`/api/chat/${_chatOrderId}`);
      const d = await r.json();
      const el = document.getElementById('chat-msgs');
      if (!el) return;
      if (!d.success || !d.data.length) { el.innerHTML = '<span class="text-neutral-500">No messages</span>'; return; }
      // Reverse (API returns newest-first), filter out empty/JSON system events
      const msgs = [...d.data].reverse().filter(m => {
        const c = (m.content || '').trim();
        return c && !c.startsWith('{');
      });
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      el.innerHTML = msgs.map(m => {
        const isUs = m.sender === 'us';
        const isSys = m.sender === 'system';
        const align = isUs ? 'text-right' : isSys ? 'text-center' : 'text-left';
        const color = isUs ? 'text-cyan-400' : isSys ? 'text-neutral-500 italic' : 'text-neutral-200';
        const bg = isUs ? 'bg-cyan-950/40' : isSys ? '' : 'bg-neutral-800';
        const time = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `<div class="${align}"><span class="inline-block ${bg} ${color} px-2 py-1 rounded text-[11px] max-w-[80%]">${esc(m.content)} <span class="text-neutral-600 text-[9px] ml-1">${time}</span></span></div>`;
      }).join('');
      const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 60;
      if (wasAtBottom) el.scrollTop = el.scrollHeight;
    }

    async function sendChat() {
      const inp = document.getElementById('chat-input');
      const msg = inp?.value.trim();
      if (!msg || !_chatOrderId) return;
      inp.value = '';
      await fetch(`/api/chat/${_chatOrderId}?message=${encodeURIComponent(msg)}`, { method: 'POST' });
      await loadMessages();
    }

    // ── Blocklist Management ──
    let blocklists = {};
    const listLabels = {
      sanctioned: 'Sanctioned',
      high_risk: 'High Risk',
      operational_risk: 'Operational Risk',
      specific_exclusions: 'Exclusions',
      banned_banks: 'Banned Banks',
    };

    async function loadBlocklists() {
      const r = await fetch('/api/compliance/blocklists');
      const d = await r.json();
      if (d.success) { blocklists = d.data; renderBlocklists(); }
    }

    function renderBlocklists() {
      const el = document.getElementById('blocklists');
      el.innerHTML = Object.entries(listLabels).map(([key, label]) => {
        const items = blocklists[key] || [];
        const isBank = key === 'banned_banks';
        const tags = items.map(v =>
          `<span class="inline-flex items-center gap-1 bg-neutral-800 border border-neutral-600 px-1.5 py-0.5 rounded text-[11px]">${v}<button class="text-red-400 hover:text-red-300 ml-0.5" onclick="removeItem('${key}','${v}')">&times;</button></span>`
        ).join('');
        return `<div class="mb-2">
          <div class="text-neutral-400 text-[11px] mb-1">${label}</div>
          <div class="flex flex-wrap gap-1 items-center">${tags}
            <input class="bg-neutral-800 border border-neutral-700 text-neutral-200 px-1.5 py-0.5 text-[11px] w-16 rounded focus:outline-none focus:border-green-500" placeholder="${isBank ? 'bank' : 'XX'}" id="add-${key}" onkeydown="if(event.key==='Enter')addItem('${key}')">
            <button class="text-green-400 text-[11px] hover:text-green-300" onclick="addItem('${key}')">+</button>
          </div>
        </div>`;
      }).join('');
    }

    async function addItem(key) {
      const inp = document.getElementById(`add-${key}`);
      const val = inp.value.trim();
      if (!val) return;
      blocklists[key] = [...(blocklists[key] || []), val];
      inp.value = '';
      await saveBlocklists(key);
    }

    async function removeItem(key, val) {
      blocklists[key] = (blocklists[key] || []).filter(v => v !== val);
      await saveBlocklists(key);
    }

    async function saveBlocklists(key) {
      await fetch('/api/compliance/blocklists', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [key]: blocklists[key] }),
      });
      await loadBlocklists();
    }

    loadBlocklists();
  </script>
</body>

</html>
